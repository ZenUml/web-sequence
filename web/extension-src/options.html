<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Settings - ZenUML Sequence</title>
    <style>
      body {
        font-size: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 16px;
      }

      .btn {
        background: #ff8c00;
        color: white;
        text-shadow: none;
        border-radius: 3px;
        border: 0;
        outline: 0;
        padding: 5px 8px;
        cursor: pointer;
        margin: 5px 0;
        font-size: inherit;
      }

      .status {
        color: green;
        margin-bottom: 10px;
      }

      .version {
        opacity: 0.6;
        font-size: 0.7em;
      }

      label {
        display: block;
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <h3>Settings <span id="js-version" class="version"></span></h3>
    <form name="optionsForm">
      <label>
        <input type="checkbox" name="preserveLastCode" /> Preserve last written
        code
      </label>

      <label>
        <input type="checkbox" name="replaceNewTab" /> Replace new tab page
      </label>

      <div id="js-status" class="status">&nbsp;</div>
      <button id="js-save-btn" class="btn">Save</button>
    </form>

    <!-- type="module" because options.js uses ESM `export` (so it is unit
         testable); a classic <script src> would throw on top-level export. -->
    <script type="module" src="options.js"></script>
  </body>
</html>
