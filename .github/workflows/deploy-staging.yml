# Build + deploy staging, gate on a deployed-URL E2E run, then auto-draft a
# production release. See docs/adr/0001-release-pipeline-imitating-conf-app.md.

name: Deploy to Stage

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  # Cancel superseded runs per ref, but NEVER cancel master — an in-flight run
  # may be creating a draft release we must not lose.
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile && pnpm build
      # Cutover (M05): build the React rewrite artifact that firebase.json now
      # serves (hosting.public: "web/dist"). web/ has its own lockfile, so it
      # needs its own install. The legacy `pnpm build` above still produces the
      # extension's dist/app/ assembly (retained for rollback).
      - name: Build web/dist (cutover hosting artifact)
        # --ignore-workspace forces pnpm to create a local web/node_modules instead of
        # hoisting into the root (pnpm-workspace.yaml exists at repo root). Without it,
        # Vite places .vite-temp in root node_modules where @vitejs/plugin-react is absent.
        working-directory: web
        run: pnpm install --no-frozen-lockfile --ignore-workspace && pnpm build
      # Pre-deploy guard: serve the built dist statically and verify the diagram
      # renders. Catches deploy-only bundling bugs (e.g. a dev-only /@fs/ asset
      # path) that the dev-server suite can't see, BEFORE anything ships to
      # staging. Runs on PRs too. See e2e/tests/production-build.spec.js.
      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify production build renders
        env:
          PW_PROD_BUILD: '1'
        run: pnpm exec playwright test production-build --project=chromium
      - name: Package Chrome extension
        # gulp release is incompatible with Node 20+; replicate its steps directly.
        run: |
          rm -rf app extension
          mkdir -p app
          rsync -a --exclude='manifest.json' static/. app/static/
          for d in help privacy-policy End-User-License-Agreement; do
            [ -d "$d" ] && cp -R "$d/." "app/$d/" || true
          done
          cp -R dist/. app/
          cp help.html app/ 2>/dev/null || true
          cp ZenUML_Sequence_Diagram_addon_help.html app/ 2>/dev/null || true
          cp src/detached-window.js app/ 2>/dev/null || true
          cp src/icon-*.png app/ 2>/dev/null || true
          cp static/manifest.json app/
          cp -R app/. extension/
          cp static/manifest.json extension/
          cp src/extension/options.js extension/
          cp src/extension/options.html extension/
          cp src/extension/eventPage.js extension/
          cp src/extension/script.js extension/
          cp static/favicon-128x128.png extension/ 2>/dev/null || true
          cp static/icon-*.png extension/ 2>/dev/null || true
          rm -rf extension/partials
          cd extension && zip -r ../extension.zip . -x "*.DS_Store" && cd ..
      - name: Setup Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > /tmp/gcp-key.json
      # Staging is a shared environment — only the master branch deploys to it.
      # PRs build + package + upload artifacts for validation but never deploy.
      - name: Deploy functions config (staging)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          cd functions && npm install && pnpm deploy:config:staging
      - name: Deploy to staging
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          pnpm deploy:staging
      - name: Upload extension dir # Browsable under actions/jobs
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: extension
      - name: Upload extension.zip # Consumed by the draft-release job
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

  # Hard gate: run the full Playwright suite against the *deployed* staging site.
  # A red gate blocks the draft release, so a production release can only ever be
  # created from a build already proven green on staging.
  staging-gate:
    name: E2E gate (staging)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      # Chromium only. Against the *deployed* site, webkit/firefox are flaky on
      # network-timed localStorage/render tests (a remote-target artifact, not a
      # product bug — the full 3-browser suite is green locally on PRs). Gating
      # releases on chromium keeps "did the deploy work?" reliable without
      # letting cross-browser flakiness block every release.
      - name: Run full E2E suite against staging
        env:
          PW_BASE_URL: https://staging.zenuml.com
        run: pnpm exec playwright test --project=chromium

  # Once the gate is green, auto-create a DRAFT production release. The only
  # remaining human action is clicking "Publish" on the draft, which fires
  # deploy-prod.yml (on: release: published).
  draft-release:
    name: Create draft release
    needs: staging-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download extension.zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
      - name: Compute release tag
        id: tag
        # Seconds included so two merges in the same minute can't collide on tag.
        run: echo "tag=release-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GH_ACTION_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          gh release create "$tag" extension.zip \
            --draft \
            --target "${{ github.sha }}" \
            --title "$tag" \
            --notes "Auto-drafted after the staging E2E gate passed on commit ${{ github.sha }}. Review, then click **Publish** to deploy to production (app.zenuml.com)."
